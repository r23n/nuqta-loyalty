<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Nuqta transaction history.">

  <title data-i18n="tx.meta">Transaction history — Nuqta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Rubik:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">

  <script>
    (function(){ try { var t=localStorage.getItem('nuqta_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); } catch(e){} })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">◆</span>
        <span data-i18n="brand.name">Nuqta</span>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a></li>
        <li><a href="transactions.html" class="active" data-i18n="nav.transactions">History</a></li>
        <li><a href="rewards.html" data-i18n="nav.rewards">Rewards</a></li>
        <li><a href="profile.html" data-i18n="nav.profile">My profile</a></li>
      </ul>

      <div class="nav-actions">
        <button class="lang-switch" id="langSwitch" aria-label="Language">
          <span class="lang-switch__current">ع</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Theme"></button>

        <div class="nav-auth" data-auth="authed">
          <a href="#" class="btn btn-ghost btn-nav" data-action="signout" data-i18n="dashboard.logout">Sign out</a>
        </div>

        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>


  <!-- Hero -->
  <section class="tx-hero">
    <div class="container">
      <div class="tx-head reveal">
        <h1 class="page-title" style="font-size:clamp(32px,4vw,48px)" data-i18n="tx.title">Transaction history</h1>
        <p class="page-sub" data-i18n="tx.sub">
          All your Nuqta activities in one place
        </p>
      </div>

      <!-- ملخّص سريع -->
      <div class="tx-summary reveal">
        <div class="tx-summary-item">
          <div class="tx-summary-label" data-i18n="tx.total.earned">Total earned</div>
          <div class="tx-summary-value tx-summary-value--green" id="sumEarned">—</div>
        </div>
        <div class="tx-summary-item">
          <div class="tx-summary-label" data-i18n="tx.total.redeemed">Total redeemed</div>
          <div class="tx-summary-value tx-summary-value--red" id="sumRedeemed">—</div>
        </div>
        <div class="tx-summary-item">
          <div class="tx-summary-label" data-i18n="tx.total.count">Transactions</div>
          <div class="tx-summary-value" id="sumCount">—</div>
        </div>
      </div>
    </div>
  </section>


  <!-- المحتوى -->
  <section class="section">
    <div class="container">

      <!-- فلاتر -->
      <div class="tx-filters reveal">
        <!-- بحث نصّي -->
        <div class="tx-search">
          <input type="text" id="txSearch" class="form-input" placeholder="Search by store..."
                 data-i18n-placeholder="tx.search.ph">
          <span class="tx-search-icon">🔍</span>
        </div>

        <!-- فلتر النوع -->
        <div class="tx-filter-group">
          <button class="filter-pill is-active" data-filter-type="all" data-i18n="tx.filter.all">All</button>
          <button class="filter-pill" data-filter-type="earn" data-i18n="tx.filter.earn">Earned</button>
          <button class="filter-pill" data-filter-type="redeem" data-i18n="tx.filter.redeem">Redeemed</button>
        </div>
      </div>


      <!-- قائمة المعاملات -->
      <div id="txList" class="reveal"></div>

      <!-- زر تحميل المزيد -->
      <div class="tx-load-more" id="txLoadMoreWrap" style="display:none;text-align:center;margin-top:24px">
        <button class="btn btn-ghost" id="txLoadMore" data-i18n="tx.load.more">Load more</button>
      </div>

    </div>
  </section>


  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:24px 0">
        <div data-i18n="footer.copyright">© 2026 Nuqta. All rights reserved.</div>
      </div>
    </div>
  </footer>


  <!-- السكربتات -->
  <script src="js/translations.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/user.js"></script>
  <script src="js/auth-ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
