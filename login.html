<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="سجّل دخول لحسابك في نُقطة.">

  <title data-i18n="login.meta">Sign in — Nuqta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Rubik:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">

  <script>
    (function(){ try { var t=localStorage.getItem('nuqta_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); } catch(e){} })();
  </script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

  <!-- Navbar مبسّط -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">◆</span>
        <span data-i18n="brand.name">Nuqta</span>
      </a>
      <div class="nav-actions">
        <button class="lang-switch" id="langSwitch" aria-label="Language">
          <span class="lang-switch__current">ع</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Theme"></button>
      </div>
    </div>
  </nav>


  <!-- نموذج تسجيل الدخول -->
  <section class="signup-section">
    <div class="container">
      <div class="signup-wrap" style="max-width: 460px">

        <div class="signup-card">
          <h1 class="signup-title" data-i18n="login.title">Welcome back</h1>
          <p class="signup-sub" data-i18n="login.sub">Sign in to access your account</p>

          <div class="form-group">
            <label for="loginEmail" data-i18n="signup.s1.email">Email</label>
            <input type="email" id="loginEmail" class="form-input"
                   placeholder="you@example.com"
                   data-i18n-placeholder="signup.s1.email.ph"
                   autocomplete="email"
                   data-no-translate dir="ltr">
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label for="loginPassword" data-i18n="signup.s1.password">Password</label>
            <input type="password" id="loginPassword" class="form-input"
                   placeholder="••••••"
                   autocomplete="current-password">
            <div class="form-error"></div>
          </div>

          <a href="#" id="forgotLink" class="login-forgot" data-i18n="login.forgot">Forgot password?</a>

          <div class="form-error form-error--center" id="loginError"></div>

          <button class="btn btn-primary btn-full" id="btnLogin" data-i18n="login.submit">
            Sign in
          </button>

          <p class="signup-alt">
            <span data-i18n="login.noaccount">New to Nuqta?</span>
            <a href="signup.html" data-i18n="login.signup.link">Create account</a>
          </p>
        </div>

      </div>
    </div>
  </section>


  <!-- السكربتات -->
  <script src="js/translations.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/user.js"></script>
  <script src="js/referral.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
