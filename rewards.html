<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Redeem your Nuqta points for exclusive rewards.">

  <title data-i18n="rewards.meta">My rewards — Nuqta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Rubik:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">

  <script>
    (function(){ try { var t=localStorage.getItem('nuqta_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); } catch(e){} })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">◆</span>
        <span data-i18n="brand.name">Nuqta</span>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a></li>
        <li><a href="rewards.html" class="active" data-i18n="nav.rewards">Rewards</a></li>
        <li><a href="profile.html" data-i18n="nav.profile">My profile</a></li>
        <li><a href="transactions.html" data-i18n="nav.transactions">History</a></li>
        <li><a href="learn.html" data-i18n="nav.learn">Earn more</a></li>
        <li><a href="pricing.html" data-i18n="nav.pricing">Pricing</a></li>
        <li class="mobile-signout" data-auth="authed"><a href="#" data-action="signout" data-i18n="dashboard.logout">Sign out</a></li>
      </ul>

      <div class="nav-actions">
        <button class="lang-switch" id="langSwitch" aria-label="Language">
          <span class="lang-switch__current">ع</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Theme"></button>

        <div class="nav-auth" data-auth="authed">
          <a href="#" class="btn btn-ghost btn-nav" data-action="signout" data-i18n="dashboard.logout">Sign out</a>
        </div>

        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>


  <!-- Hero -->
  <section class="rewards-hero">
    <div class="container">

      <!-- رأس الصفحة -->
      <div class="rewards-head reveal">
        <h1 class="rewards-title">
          <span data-i18n="rewards.page.title">Redeem your points</span>
        </h1>
        <p class="rewards-sub" data-i18n="rewards.page.sub">
          Turn your points into real rewards from Bahrain's finest stores.
        </p>
      </div>

      <!-- بطاقة الرصيد الحالي -->
      <div class="rewards-balance reveal">
        <div class="rewards-balance-label" data-i18n="dashboard.balance.label">
          Current balance
        </div>
        <div class="rewards-balance-num" id="balanceNumber">—</div>
        <div class="rewards-balance-unit" data-i18n="dashboard.balance.unit">points</div>
      </div>

    </div>
  </section>


  <!-- كتالوج المكافآت -->
  <section class="section section--soft">
    <div class="container">

      <!-- فلاتر (اختياري) -->
      <div class="rewards-filters reveal" id="rewardsFilters">
        <button class="filter-pill is-active" data-filter="all" data-i18n="rewards.filter.all">All</button>
        <button class="filter-pill" data-filter="food" data-i18n="rewards.filter.food">Food & Drinks</button>
        <button class="filter-pill" data-filter="shopping" data-i18n="rewards.filter.shopping">Shopping</button>
        <button class="filter-pill" data-filter="experiences" data-i18n="rewards.filter.experiences">Experiences</button>
        <button class="filter-pill" data-filter="travel" data-i18n="rewards.filter.travel">Travel</button>
      </div>

      <!-- شبكة المكافآت (تملأها rewards.js) -->
      <div class="rewards-catalog" id="rewardsCatalog"></div>

    </div>
  </section>


  <!-- تاريخ الاستبدالات السابقة -->
  <section class="section">
    <div class="container">
      <div class="panel-head reveal">
        <h2 class="panel-title" data-i18n="rewards.history.title">My redeemed rewards</h2>
      </div>

      <div id="myRedemptions" class="reveal"></div>
    </div>
  </section>


  <!-- Footer مبسّط -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0">
        <div data-i18n="footer.copyright">© 2026 Nuqta. All rights reserved.</div>
        <div>
          <a href="dashboard.html" data-i18n="nav.dashboard" style="color:var(--gold)">Dashboard</a>
        </div>
      </div>
    </div>
  </footer>


  <!-- السكربتات -->
  <script src="js/translations.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/user.js"></script>
  <script src="js/auth-ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
