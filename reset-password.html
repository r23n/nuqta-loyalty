<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-i18n="reset.meta">Reset password — Nuqta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Rubik:wght@300;400;500;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">

  <script>
    (function(){ try { var t=localStorage.getItem('nuqta_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); } catch(e){} })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">◆</span>
        <span data-i18n="brand.name">Nuqta</span>
      </a>
      <div class="nav-actions">
        <button class="lang-switch" id="langSwitch" aria-label="Language">
          <span class="lang-switch__current">ع</span>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Theme"></button>
      </div>
    </div>
  </nav>


  <section class="signup-section">
    <div class="container">
      <div class="signup-wrap" style="max-width: 460px">

        <div class="signup-card">
          <h1 class="signup-title" data-i18n="reset.title">Set a new password</h1>
          <p class="signup-sub" data-i18n="reset.sub">
            Enter your new password below.
          </p>

          <div class="form-group">
            <label for="newPassword" data-i18n="reset.new">New password</label>
            <input type="password" id="newPassword" class="form-input"
                   placeholder="At least 6 characters"
                   data-i18n-placeholder="signup.s1.password.ph"
                   autocomplete="new-password">
            <div class="form-error"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword" data-i18n="reset.confirm">Confirm password</label>
            <input type="password" id="confirmPassword" class="form-input"
                   placeholder="Repeat your password"
                   data-i18n-placeholder="reset.confirm.ph"
                   autocomplete="new-password">
            <div class="form-error"></div>
          </div>

          <div class="form-error form-error--center" id="resetError"></div>

          <button class="btn btn-primary btn-full" id="btnReset" data-i18n="reset.submit">
            Update password
          </button>

          <p class="signup-alt">
            <a href="login.html" data-i18n="reset.back">← Back to sign in</a>
          </p>
        </div>

      </div>
    </div>
  </section>


  <script src="js/translations.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/user.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
